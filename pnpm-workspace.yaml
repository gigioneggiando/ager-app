packages:
  - "apps/*"
  - "packages/*"

# Per-dependency lifecycle-build approvals (pnpm). true = allow its install/build
# scripts to run; false = skip (the dep ships prebuilt binaries and needs nothing).
# sharp powers next/image; esbuild/@swc back the test+build toolchain.
allowBuilds:
  "@parcel/watcher": false
  # Sourcemap-upload CLI for Sentry's build plugin. We init Sentry manually via
  # instrumentation (no withSentryConfig), so the binary is never used — skip its build.
  "@sentry/cli": false
  "@swc/core": true
  esbuild: true
  sharp: true
  unrs-resolver: false
